<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston House Price Prediction Model</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#e491a6,#845763,#92e4ba,#90c67f);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:1100px;
            background:#4f8ba4;
            border-radius:18px;
            padding:40px;
            box-shadow:0px 15px 40px rgba(0,0,0,.3);
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:rgb(144, 50, 16);
            margin-bottom:30px;
        }

        form{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .input-group{
            display:flex;
            flex-direction:column;
        }

        label{
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        input{
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
            outline:none;
            transition:.3s;
            font-size:15px;
        }

        input:focus{
            border-color:#2563eb;
            box-shadow:0px 0px 8px rgba(37,99,235,.4);
        }

        .btn{
            grid-column:1/-1;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
            font-weight:bold;
        }

        .btn:hover{
            background:#2f20959d;
            transform:translateY(-3px);
        }

        .result{
            margin-top:30px;
            text-align:center;
            background:#f8fafc;
            padding:20px;
            border-radius:12px;
            font-size:22px;
            font-weight:bold;
            color:#16a34a;
        }

        @media(max-width:768px){
            .container{
                padding:20px;
            }
        }

    </style>
</head>
<body>

<div class="container">

    <h1>🏠 Boston House Price Prediction Model</h1>
    <p>Enter all feature values to predict the house price.</p>

    <form action="{{ url_for('predict') }}" method="POST">

        <div class="input-group">
            <label>CRIM</label>
            <input type="number" step="any" name="CRIM" required>
        </div>

        <div class="input-group">
            <label>ZN</label>
            <input type="number" step="any" name="ZN" required>
        </div>

        <div class="input-group">
            <label>INDUS</label>
            <input type="number" step="any" name="INDUS" required>
        </div>

        <div class="input-group">
            <label>CHAS</label>
            <input type="number" step="any" name="CHAS" required>
        </div>

        <div class="input-group">
            <label>NOX</label>
            <input type="number" step="any" name="NOX" required>
        </div>

        <div class="input-group">
            <label>RM</label>
            <input type="number" step="any" name="RM" required>
        </div>

        <div class="input-group">
            <label>AGE</label>
            <input type="number" step="any" name="AGE" required>
        </div>

        <div class="input-group">
            <label>DIS</label>
            <input type="number" step="any" name="DIS" required>
        </div>

        <div class="input-group">
            <label>RAD</label>
            <input type="number" step="any" name="RAD" required>
        </div>

        <div class="input-group">
            <label>TAX</label>
            <input type="number" step="any" name="TAX" required>
        </div>

        <div class="input-group">
            <label>PTRATIO</label>
            <input type="number" step="any" name="PTRATIO" required>
        </div>

        <div class="input-group">
            <label>B</label>
            <input type="number" step="any" name="B" required>
        </div>

        <div class="input-group">
            <label>LSTAT</label>
            <input type="number" step="any" name="LSTAT" required>
        </div>

        <button class="btn" type="submit">
            🔍 Predict House Price
        </button>

    </form>

    {% if prediction_text %}
    <div class="result">
        {{prediction_text}}
    </div>
    {% endif %}

</div>

</body>
</html>
